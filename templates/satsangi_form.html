{% extends 'base.html' %}
{% block title %}{{ 'Edit' if satsangi else 'Add' }} Satsangi{% endblock %}
{% block page_title_admin %}{{ 'Edit' if satsangi else 'Add' }} Satsangi{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('satsangis') }}">Satsangis</a>
    <span class="breadcrumb-sep">›</span>
    <span>{{ 'Edit' if satsangi else 'New Satsangi' }}</span>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" value="{{ satsangi.name if satsangi else '' }}"
                   placeholder="Full name" required autofocus>
        </div>
        <div class="form-group">
            <label>Mobile *</label>
            <input type="tel" name="mobile" value="{{ satsangi.mobile if satsangi else '' }}"
                   placeholder="10-digit mobile number" required
                   pattern="[0-9]{10}" title="Enter 10-digit mobile number">
        </div>
        <div class="form-group">
            <label>Address <span style="font-weight:400;color:var(--text3);font-size:11px;">(optional)</span></label>
            <textarea name="address" placeholder="Village, city or area">{{ satsangi.address if satsangi else '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ 'Save Changes' if satsangi else 'Add Satsangi' }}</button>
            <a href="{{ url_for('satsangis') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

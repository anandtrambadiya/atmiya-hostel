<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volunteer Login</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg);
        margin-left: 0 !important;
      }
      .main-content {
        margin-left: 0 !important;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-wrap {
        width: 100%;
        max-width: 400px;
        padding: 24px;
      }
      .login-card {
        background: var(--bg2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 40px 36px;
        box-shadow: var(--shadow-lg);
        text-align: center;
      }
      .login-icon {
        width: 64px;
        height: 64px;
        background: var(--accent-light);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 20px;
      }
      .login-title {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .login-sub {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 28px;
        line-height: 1.5;
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 44px;
        text-align: left;
        letter-spacing: 0.08em;
        font-size: 16px;
      }
      .pw-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: var(--text3);
      }
      .error-msg {
        background: var(--red-light);
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: var(--red);
        margin-bottom: 16px;
      }
      .login-btn {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        font-size: 15px;
        justify-content: center;
      }
      .back-link {
        display: block;
        margin-top: 20px;
        font-size: 12px;
        color: var(--text3);
        text-decoration: none;
      }
      .back-link:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-icon">🙋</div>
        <div class="login-title">Volunteer Access</div>
        <div class="login-sub">
          Enter your volunteer password to access the attendance system
        </div>

        {% if error %}
        <div class="error-msg">🔒 {{ error }}</div>
        {% endif %}

        <form method="POST">
          <div class="form-group" style="text-align: left">
            <label>Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                name="password"
                id="pw-input"
                placeholder="Enter volunteer password"
                autofocus
                required
              />
              <button type="button" class="pw-toggle" onclick="togglePw()">
                👁
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary login-btn">
            Login →
          </button>
        </form>
        <a href="{{ url_for('dashboard') }}" class="back-link"
          >← Back to Admin Dashboard</a
        >
      </div>
    </div>
    <script>
      function togglePw() {
        const i = document.getElementById("pw-input");
        i.type = i.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>

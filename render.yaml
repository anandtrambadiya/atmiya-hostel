services:
  - type: web
    name: hostel-assembly
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: DB_PATH
        value: /data/hostel.db
    disk:
      name: hostel-data
      mountPath: /data
      sizeGB: 1
